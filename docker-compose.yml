version: '3.9'

services:
  api:
    build: .
    container_name: employee_api
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=Employee_Management;User Id=sa;Password=Admin1234;TrustServerCertificate=True
      - Jwt__Key=Y8xHHzWQmQx8X9h7yVvNMJn2pKL5sTdJcF8eR6uA1I=
      - Jwt__Issuer=EmployeeAPI
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - SA_PASSWORD=Admin1234
      - ACCEPT_EULA=Y
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: